name: Sync Docs to Dragonwing Docs

on:
  push:
    branches:
      - main
      - 'release/**'  # Matches any release branch dynamically!
    paths:
      - '**.md'
      - '**.mdx'
      - '*nav.json'
      - 'media/**'
      - 'images/**'
      - 'snippets/**'
      - '!.github/**'
  workflow_dispatch:

jobs:
  sync:
    uses: dragonwing-docs/docops-workflows/.github/workflows/sync-to-dragonwing-docs.yml@main
    with:
      target_path: "Key-Documents/Build-Guide"
      repo_name: "build-guide"
      source_branch: "${{ github.ref_name }}"
      hub_branch: "${{ github.ref_name }}"
      is_landing_page: false
    secrets:
      DOCS_SYNC_APP_ID: ${{ secrets.DOCS_SYNC_APP_ID }}
      DOCS_SYNC_APP_PRIVATE_KEY: ${{ secrets.DOCS_SYNC_APP_PRIVATE_KEY }}
